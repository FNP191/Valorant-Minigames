<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant Who's Who</title>
    <style>
        :root {
            --v-red: #ff4655;
            --v-dark: #0f1923;
            --v-blue: #1f2731;
            --v-white: #ece8e1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--v-dark);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
        }

        h1 { color: var(--v-red); margin-bottom: 20px; text-transform: uppercase; font-size: 1.5rem; text-align: center; }

        /* Contenedores Superiores */
        .header-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            width: 100%;
            max-width: 900px;
            margin-bottom: 25px;
        }

        .panel {
            background: var(--v-blue);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 200px;
        }

        .secret-panel { border: 2px solid var(--v-red); }
        .secret-panel img { width: 70px; height: 70px; border-radius: 50%; background: var(--v-white); margin: 10px 0; }
        .secret-panel h3 { font-size: 1.1rem; color: var(--v-red); }

        .stats-panel { justify-content: center; gap: 8px; }
        .stat { font-size: 0.9rem; color: #ccc; }
        .stat span { color: var(--v-red); font-weight: bold; font-size: 1.1rem; }

        select, .btn {
            background: transparent;
            border: 1px solid var(--v-red);
            color: var(--v-red);
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            width: 100%;
            margin-top: 5px;
        }

        .btn:hover { background: var(--v-red); color: white; }

        /* Tablero */
        .board {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 1000px;
        }

        .agent-card {
            background: var(--v-white);
            color: var(--v-dark);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 3px solid transparent;
        }

        .agent-card:hover { border-color: var(--v-red); transform: scale(1.03); }
        .agent-card img { width: 100%; height: auto; border-radius: 4px; display: block; }
        .agent-card h4 { font-size: 0.85rem; margin-top: 5px; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; }
        .agent-card p { font-size: 0.7rem; color: var(--v-red); font-weight: bold; }

        .discarded { opacity: 0.1; filter: grayscale(1); transform: scale(0.9); pointer-events: none; }

        /* Overlay Victoria */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .win-box { background: var(--v-blue); padding: 40px; border-radius: 20px; border: 3px solid #22c55e; text-align: center; }
        .win-box h2 { color: #22c55e; font-size: 2rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>VALORANT: WHO IS WHO?</h1>

    <div class="header-container">
        <div class="panel secret-panel">
            <small>TU OBJETIVO</small>
            <img id="sec-img" src="" alt="">
            <h3 id="sec-name">...</h3>
        </div>

        <div class="panel stats-panel">
            <div class="stat">Intentos: <span id="att-count">0</span></div>
            <div class="stat">Tachados: <span id="disc-count">0</span></div>
            <select id="role-sel" onchange="filterRole()">
                <option value="all">TODOS LOS ROLES</option>
            </select>
            <button class="btn" onclick="resetGame()">Reiniciar</button>
        </div>
    </div>

    <div class="board" id="game-board"></div>

    <div class="overlay" id="win-overlay">
        <div class="win-box">
            <h2>¡LOGRADO!</h2>
            <p id="win-txt"></p><br>
            <button class="btn" onclick="resetGame()">Jugar de nuevo</button>
        </div>
    </div>

    <script>
        const api = 'https://valorant-api.com/v1/agents?isPlayableCharacter=true&language=es-ES';
        let agents = [], secret = null, tries = 0;

        async function start() {
            try {
                const r = await fetch(api);
                const d = await r.json();
                agents = d.data;
                
                // Cargar Roles
                const roles = [...new Set(agents.map(a => a.role.displayName))];
                const sel = document.getElementById('role-sel');
                roles.forEach(rol => {
                    let o = document.createElement('option');
                    o.value = rol; o.innerText = rol;
                    sel.appendChild(o);
                });

                render();
                resetGame();
            } catch (err) { alert("Error al conectar con Valorant API"); }
        }

        function render() {
            const b = document.getElementById('game-board');
            b.innerHTML = '';
            agents.forEach(a => {
                const c = document.createElement('div');
                c.className = 'agent-card';
                c.dataset.role = a.role.displayName;
                c.innerHTML = `
                    <img src="${a.displayIcon}" onerror="this.src='https://via.placeholder.com/100?text=Agent'">
                    <h4>${a.displayName}</h4>
                    <p>${a.role.displayName}</p>
                `;
                c.onclick = () => hit(c, a);
                b.appendChild(c);
            });
        }

        function filterRole() {
            const val = document.getElementById('role-sel').value;
            document.querySelectorAll('.agent-card').forEach(c => {
                c.style.display = (val === 'all' || c.dataset.role === val) ? 'block' : 'none';
            });
        }

        function resetGame() {
            tries = 0;
            document.getElementById('win-overlay').style.display = 'none';
            document.getElementById('role-sel').value = 'all';
            
            secret = agents[Math.floor(Math.random() * agents.length)];
            document.getElementById('sec-img').src = secret.displayIcon;
            document.getElementById('sec-name').innerText = secret.displayName;

            document.querySelectorAll('.agent-card').forEach(c => {
                c.classList.remove('discarded');
                c.style.display = 'block';
            });
            update();
        }

        function hit(card, agent) {
            if (agent.uuid === secret.uuid) {
                document.getElementById('win-txt').innerText = `Encontraste a ${agent.displayName} en ${tries + 1} clics.`;
                document.getElementById('win-overlay').style.display = 'flex';
            } else {
                card.classList.add('discarded');
                tries++;
            }
            update();
        }

        function update() {
            document.getElementById('att-count').innerText = tries;
            document.getElementById('disc-count').innerText = document.querySelectorAll('.agent-card.discarded').length;
        }

        start();
    </script>
</body>
</html>
