<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant Minigames</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="main-menu">
        <h1 class="menu-title">VALORANT MINIGAMES</h1>
        <div id="loading-spinner" class="loader"></div>
        <div class="mode-container" id="menu-grid" style="display: none;">
            </div>
    </div>

    <div id="game-interface">
        <div class="header-game">
            <button class="btn" onclick="backToMenu()">&larr; Men&uacute;</button>
            <h2 id="display-mode">MODO</h2>
            <div style="width:80px"></div>
        </div>

        <div style="display:flex; gap:20px; flex-wrap:wrap; align-items: flex-start;">
            <div class="card-panel" style="max-width: 300px;">
                <h3 id="panel-title" style="margin-bottom: 15px;">Agente Secreto</h3>
                <div class="secret-agent-container">
                    <span id="q-mark" class="q-mark">?</span>
                    <img id="secret-img" class="secret-agent-img" src="">
                </div>
                <h3 id="secret-name" style="margin-bottom: 15px;">???</h3>

                <div id="classic-pick-zone" style="display:none;">
                    <button class="btn btn-wide" onclick="startPicking()">Elegir mi Agente</button>
                </div>

                <div id="reset-zone" style="display:none;">
                    <button class="btn btn-wide" style="background:#ff4655; color:white;" onclick="resetGame()">REINICIAR TABLERO</button>
                </div>
            </div>

            <div id="ask-interface-container" class="ask-panel-container" style="flex: 2; display: none;">
                <div class="stats-grid-img">
                    <div class="stat-box-img">
                        <div class="stat-label-img">Preguntas</div>
                        <div class="stat-val-img"><span id="stat-q">0</span> / 10</div>
                    </div>
                    <div class="stat-box-img">
                        <div class="stat-label-img">Fallos</div>
                        <div class="stat-val-img"><span id="stat-f">0</span> / 3</div>
                    </div>
                </div>

                <div id="game-message"></div>

                <div id="ask-controls">
                    <button id="btn-discard" class="btn" style="width: 100%; margin-bottom: 15px;" onclick="toggleDiscardMode()">Modo Descarte: DESACTIVADO</button>
                    <div style="display:flex; gap:10px; margin-bottom:15px;">
                        <select id="cat-sel" onchange="updateValOptions()" style="flex:1; padding:12px; background:#0f1923; color:white; border:1px solid #333; border-radius: 5px;">
                            <option value="role">¿Su Rol es...?</option>
                            <option value="country">¿Es de...?</option>
                            <option value="gender">¿Es de Género...?</option>
                            <option value="flash">¿Tiene Flash?</option>
                            <option value="stunt">¿Puede Stunear?</option>
                            <option value="humo">¿Tiene Humo?</option>
                            <option value="slow">¿Tiene Slow?</option>
                            <option value="reveal">¿Tiene Reveal?</option>
                        </select>
                        <select id="val-sel" style="flex:1; padding:12px; background:#0f1923; color:white; border:1px solid #333; border-radius: 5px;"></select>
                    </div>
                    <button class="btn btn-wide" onclick="askQuestion()">PREGUNTAR ATRIBUTO</button>
                </div>

                <div id="history-list"></div>
            </div>
        </div>

        <div class="board" id="board"></div>
    </div>

    <div id="minigame-interface">
        <div class="header-game">
            <button class="btn" onclick="backToMenu()">&larr; Men&uacute;</button>
            <h2 id="mini-title-display">MINIJUEGO</h2>
            <div style="text-align:right;">
                <span style="color:#aaa; font-size:0.8rem; margin-right: 15px;">Tiempo: <span id="mini-timer-display" style="color:#ff4655; font-weight:bold;">15</span>s</span>
                <span style="color:#aaa; font-size:0.8rem;">Racha: <span id="mini-streak-display" style="color:#ff4655; font-weight:bold;">0</span></span>
            </div>
        </div>
        <div class="mini-card">
            <div id="mini-msg"></div>
            <img id="mini-img" class="mini-img" style="display:none;">
            <div id="mini-clue" class="clue-box"></div>
            
            <div id="mini-input-zone" style="display:none; width: 100%;">
                <input type="text" id="mini-input" placeholder="Nombre del agente/skin...">
                <button class="btn" style="width:100%" onclick="checkMiniAnswer()">Responder</button>
            </div>
            
            <div id="mini-options" class="options-grid" style="display:none;"></div>
            
            <button id="btn-next" class="btn" style="width:100%; margin-top:20px; display:none; background:#ff4655; color:white;" onclick="loadMiniRound()">Siguiente &rarr;</button>
        </div>
    </div>

    <div id="wordle-interface">
        <div class="header-game">
            <button class="btn" onclick="backToMenu()">&larr; Men&uacute;</button>
            <h2>WORDLE VALORANT</h2>
            <div style="width:80px; text-align:right;">
                <span style="color:#aaa; font-size:0.8rem;">Racha: <span id="wordle-streak" style="color:#ff4655; font-weight:bold;">0</span></span>
            </div>
        </div>
        <div id="wordle-hint"></div>
        <div id="wordle-msg"></div>
        <div class="wordle-grid" id="wordle-grid"></div>
        <div class="wordle-keyboard" id="wordle-keyboard"></div>
        <div style="text-align:center; margin-top:15px;">
            <button id="wordle-next-btn" class="btn" style="display:none; background:#ff4655; color:white;" onclick="startWordle()">Siguiente &rarr;</button>
        </div>
    </div>

    <footer class="footer-bar">
        MADE BY FNP191
    </footer>

    <script src="script.js"></script>
</body>
</html>
